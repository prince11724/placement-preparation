<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlacePrep - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #3b82f6
    );
}

.container{
    width:95%;
    max-width:420px;
}

.card{
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.2);

    padding:35px;
    border-radius:25px;

    color:white;

    box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    font-size:2rem;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    margin-bottom:25px;
    opacity:.8;
}

.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px;

    border:none;
    outline:none;

    border-radius:12px;

    background:rgba(255,255,255,.15);
    color:white;
    font-size:15px;
}

input::placeholder{
    color:rgba(255,255,255,.8);
}

button{
    width:100%;
    padding:15px;

    border:none;
    border-radius:50px;

    cursor:pointer;

    font-size:16px;
    font-weight:bold;

    margin-top:10px;

    background:linear-gradient(
        45deg,
        #00c6ff,
        #0072ff
    );

    color:white;

    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
}

.links{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.links a{
    color:#00e5ff;
    text-decoration:none;
}

.forgot{
    margin-top:10px;
    display:block;
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div class="logo">🚀 PlacePrep</div>

<div class="subtitle">
Welcome back! Login to continue your journey
</div>

<form action="/login" method="POST">

<div class="input-group">
<input type="email"
       name="email"
       placeholder="Email Address"
       required>
</div>

<div class="input-group">
<input type="password"
       name="password"
       placeholder="Password"
       required>
</div>

<button type="submit">
Login
</button>

</form>

<div class="links">

<a href="/forgot" class="forgot">
Forgot Password?
</a>

<p style="margin-top:15px;">
New here?
<a href="/signup">Create Account</a>
</p>

</div>

</div>

</div>

<script>

function login(e){
    e.preventDefault();

    const email =
        document.querySelector('input[name="email"]').value;

    const password =
        document.querySelector('input[name="password"]').value;

    if(email==="admin@gmail.com" &&
       password==="123456")
    {
        window.location.href="dashboard.html";
    }
    else
    {
        alert("Invalid Email or Password");
    }
}

</script>

</body>
</html>
