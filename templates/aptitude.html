<!DOCTYPE html>
<html>
<head>
<title>Aptitude Test</title>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#f5f7fb;
    padding:30px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.heading{
    text-align:center;
    margin-bottom:30px;
}

.heading h1{
    color:#6c63ff;
    font-size:36px;
}

.heading p{
    color:#64748b;
}

.question-card{
    background:white;
    padding:25px;
    margin-bottom:20px;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.question-card h3{
    margin-bottom:20px;
    color:#1e293b;
}

.option{
    display:block;
    padding:12px;
    margin-bottom:10px;
    border:1px solid #e2e8f0;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#f1f5f9;
    border-color:#6c63ff;
}

.option input{
    margin-right:10px;
}

.submit-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:15px;
    background:#6c63ff;
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:#5b52ff;
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    color:white;
    background:#64748b;
    padding:10px 18px;
    border-radius:10px;
}

.score-box{
    background:white;
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

</style>
</head>
<body>

<div class="container">

<a href="/dashboard" class="back-btn">
← Dashboard
</a>

<div class="heading">
    <h1>🧠 Aptitude Test</h1>
    <p>Solve the questions and improve your score</p>
</div>

<form action="/submit_aptitude" method="POST">

{% for q in questions %}

<div class="question-card">

    <h3>{{ loop.index }}. {{ q[1] }}</h3>

    <label>
        <input type="radio"
               name="q{{ q[0] }}"
               value="{{ q[2] }}">
        {{ q[2] }}
    </label><br>

    <label>
        <input type="radio"
               name="q{{ q[0] }}"
               value="{{ q[3] }}">
        {{ q[3] }}
    </label><br>

    <label>
        <input type="radio"
               name="q{{ q[0] }}"
               value="{{ q[4] }}">
        {{ q[4] }}
    </label><br>

    <label>
        <input type="radio"
               name="q{{ q[0] }}"
               value="{{ q[5] }}">
        {{ q[5] }}
    </label>

</div>

<br>

{% endfor %}

<button type="submit">
🚀 Submit Test
</button>

</form>


</body>
</html>
