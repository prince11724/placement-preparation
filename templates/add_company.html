<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Company</title>
</head>
<body>
{% include 'sidebar.html' %}
<h1>Add Company</h1>

<form method="POST">

    <input type="text"
           name="company"
           placeholder="Company Name"
           required><br><br>

    <input type="text"
           name="package"
           placeholder="Package"
           required><br><br>

    <input type="text"
           name="role"
           placeholder="Role"
           required><br><br>

    <input type="number"
           step="0.1"
           name="cgpa"
           placeholder="Minimum CGPA"
           required><br><br>

    <button type="submit">
        Add Company
    </button>

</form>

</body>
</html>
