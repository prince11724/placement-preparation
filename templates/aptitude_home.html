<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aptitude</title>

<style>

body{
    font-family:Poppins;
    background:#f5f7fb;
    text-align:center;
    padding-top:80px;
}

.card{
    width:500px;
    margin:auto;
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#6c63ff;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

</style>
</head>
<body>

<div class="card">

<h1>🧠 Aptitude Practice</h1>

<h3>Your Current Score: {{ score }}%</h3>

<p>Practice aptitude questions and improve your placement readiness.</p>

<a href="/aptitude_test" class="btn">
🚀 Start Test
</a>

</div>

</body>
</html>
